# Editor login is handled by DecapBridge (PKCE) — staff log in with
# Google / Microsoft / password. Values below come from your DecapBridge site.
backend:
  name: git-gateway
  auth_type: pkce
  repo: alexlewthwaite/thegarrison4
  branch: main
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/e0097cb0-c2a5-45d1-98e6-333fbf53fb5d/pkce
  auth_token_endpoint: /sites/e0097cb0-c2a5-45d1-98e6-333fbf53fb5d/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# PKCE user fields (optional)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Where uploaded images/PDFs are stored in the repo
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# "View live" link shown to editors
site_url: https://thegarrisoncastletown.netlify.app/
display_url: https://thegarrisoncastletown.netlify.app/

collections:
  - name: "content"
    label: "Website"
    delete: false
    editor:
      preview: false
    files:
      - name: "site"
        label: "The Garrison — Page Content"
        file: "content.json"
        format: json
        description: "Edit any section below, then click Publish. The website updates within a minute or two."
        fields:
          - label: "Hero (top of page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "text" }
              - label: "Opening hours"
                name: "hours"
                widget: "object"
                fields:
                  - { label: "Breakfast", name: "breakfast", widget: "string" }
                  - { label: "Lunch", name: "lunch", widget: "string" }
                  - { label: "Dinner", name: "dinner", widget: "string" }

          - label: "About Us"
            name: "about"
            widget: "object"
            fields:
              - { label: "Welcome line (large red text)", name: "lead", widget: "text" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "text", widget: "text" }

          - label: "What's On (events)"
            name: "events"
            widget: "list"
            label_singular: "Event"
            summary: "{{fields.title}} — {{fields.date}}"
            hint: "Add upcoming events. Once an event's date has passed it disappears from the website automatically — no need to delete it."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Date"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "ddd D MMM YYYY"
                time_format: false
                picker_utc: false
              - { label: "Time", name: "time", widget: "string", required: false, hint: "e.g. 8pm, or 7–10pm" }
              - { label: "Details", name: "description", widget: "text", required: false }

          - label: "Menus"
            name: "menus"
            widget: "list"
            label_singular: "Menu"
            summary: "{{fields.title}}"
            hint: "Add, remove or reorder menu cards. Drag the handle to reorder."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Card action"
                name: "linkType"
                widget: "select"
                options:
                  - { label: "Link to a PDF menu", value: "pdf" }
                  - { label: "Open the booking widget", value: "book" }
                default: "pdf"
              - label: "PDF menu"
                name: "pdf"
                widget: "file"
                required: false
                media_library: { config: { allowed_formats: ["pdf"] } }
                hint: "Upload the menu PDF. Leave blank if this card opens booking."

          - label: "Games Room"
            name: "games"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Note", name: "note", widget: "text" }
              - { label: "Phone", name: "phone", widget: "string" }
              - label: "Photos (rotate automatically)"
                name: "images"
                widget: "list"
                field: { label: "Photo", name: "image", widget: "image" }
                hint: "Add multiple photos and they'll fade through one after another beside the Games Room text."

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro text", name: "lead", widget: "text" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Opening hours line", name: "hours", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Google Maps URL", name: "mapUrl", widget: "string" }

          - label: "Social links"
            name: "social"
            widget: "list"
            label_singular: "Link"
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
